<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Study Planner{% endblock %}</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #007BFF;
            --primary-d: #0056b3;
            --primary-l: #e6f0ff;
            --bg: #f0f4f8;
            --white: #fff;
            --text: #333;
            --muted: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
            --sidebar-w: 240px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-w);
            background: linear-gradient(180deg, #0056b3, #003d82);
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 24px 20px 20px;
            font-size: 18px;
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 255, 255, .15);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-section {
            padding: 16px 12px 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, .5);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 20px;
            text-decoration: none;
            color: rgba(255, 255, 255, .85);
            font-size: 14px;
            border-radius: 8px;
            margin: 2px 8px;
            transition: background .2s;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, .15);
            color: white;
        }

        .nav-item .icon {
            font-size: 17px;
            width: 22px;
            text-align: center;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, .15);
            font-size: 13px;
            color: rgba(255, 255, 255, .7);
        }

        .sidebar-footer .user-name {
            font-weight: 600;
            color: white;
        }

        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
        }

        .topbar {
            background: var(--white);
            border-bottom: 1px solid #dee2e6;
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar h1 {
            font-size: 20px;
            color: var(--primary-d);
            font-weight: 700;
        }

        .btn-logout {
            background: var(--primary-l);
            color: var(--primary-d);
            border: none;
            padding: 7px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            text-decoration: none;
        }

        .btn-logout:hover {
            background: #cfe2ff;
        }

        @media (max-width: 768px) {
            .sidebar {
                top: auto;
                bottom: 0;
                width: 100%;
                height: 60px;
                flex-direction: row;
                padding: 0;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }
            .sidebar-brand, .nav-section, .sidebar-footer {
                display: none;
            }
            .nav-item {
                flex: 1;
                justify-content: center;
                margin: 0;
                border-radius: 0;
                padding: 0;
                font-size: 11px;
                text-align: center;
                flex-direction: column;
                gap: 2px;
            }
            .main {
                margin-left: 0;
                padding-bottom: 60px;
            }
            .topbar {
                padding: 14px 20px;
            }
            .topbar h1 {
                font-size: 18px;
            }
        }

        {% block extra_css %}{% endblock %}

        .alarm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.55);
            z-index: 9000;
            align-items: center;
            justify-content: center;
        }
        .alarm-overlay.open { display: flex; }
        .alarm-modal {
            background: white;
            border-radius: 16px;
            padding: 28px 28px 22px;
            width: 360px;
            max-width: 94vw;
            box-shadow: 0 12px 40px rgba(0,0,0,.25);
            text-align: center;
            animation: alarm-pop .25s ease;
        }
        @keyframes alarm-pop {
            from { transform: scale(.88); opacity: 0; }
            to   { transform: scale(1);  opacity: 1; }
        }
        .alarm-icon { font-size: 40px; margin-bottom: 10px; }
        .alarm-subject {
            font-size: 11px;
            font-weight: 700;
            color: #007BFF;
            text-transform: uppercase;
            letter-spacing: .6px;
            margin-bottom: 4px;
        }
        .alarm-topic {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .alarm-time {
            font-size: 13px;
            color: #6c757d;
            margin-bottom: 20px;
        }
        .alarm-stop-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 11px 32px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
        .alarm-stop-btn:hover { background: #b02a37; }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-brand">StudyMate</div>
        <div class="nav-section">Main</div>
        <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">Dashboard</a>
        <a href="/schedule/" class="nav-item {% if request.path == '/schedule/' %}active{% endif %}">Schedule</a>
        <a href="/history/" class="nav-item {% if request.path == '/history/' %}active{% endif %}">History</a>
        <div class="nav-section">Study</div>
        <a href="/subjects/" class="nav-item {% if '/subjects' in request.path %}active{% endif %}">Subjects</a>
        <div class="nav-section">Account</div>
        <a href="/profile/" class="nav-item {% if request.path == '/profile/' %}active{% endif %}">Profile</a>
        <div class="sidebar-footer">
            <div class="user-name">{{ user.name }}</div>
            <div>{{ user.email }}</div>
        </div>
    </aside>
    <div class="main">
        {% block content %}{% endblock %}
    <div class="alarm-overlay" id="alarmOverlay">
        <div class="alarm-modal">
            <div class="alarm-icon">⏰</div>
            <div class="alarm-subject" id="alarm-subject"></div>
            <div class="alarm-topic" id="alarm-topic"></div>
            <div class="alarm-time" id="alarm-time"></div>
            <button class="alarm-stop-btn" onclick="stopAlarm()">Stop Alarm</button>
        </div>
    </div>
    <audio id="alarmAudio" src="/media/alarm_tone/alarm.mp3" loop></audio>

    <script>
        var _alarmFired = {};
        var _alarmAudio = document.getElementById('alarmAudio');
        var _alarmQueue = [];

        function _showNextAlarm() {
            if (_alarmQueue.length === 0) return;
            var s = _alarmQueue.shift();
            document.getElementById('alarm-subject').textContent = s.subject_name;
            document.getElementById('alarm-topic').textContent = s.topic_name;
            document.getElementById('alarm-time').textContent = s.start_time + ' – ' + s.end_time;
            document.getElementById('alarmOverlay').classList.add('open');
            _alarmAudio.currentTime = 0;
            _alarmAudio.play().catch(function(){});
        }

        function stopAlarm() {
            _alarmAudio.pause();
            _alarmAudio.currentTime = 0;
            document.getElementById('alarmOverlay').classList.remove('open');
            if (_alarmQueue.length > 0) {
                setTimeout(_showNextAlarm, 400);
            }
        }

        function _checkAlarms(sessions) {
            var now = new Date();
            var nowMin = now.getHours() * 60 + now.getMinutes();
            sessions.forEach(function(s) {
                if (_alarmFired[s.id]) return;
                var parts = s.end_time.split(':');
                if (parts.length < 2) return;
                var endMin = parseInt(parts[0]) * 60 + parseInt(parts[1]);
                if (nowMin >= endMin && nowMin <= endMin + 1) {
                    _alarmFired[s.id] = true;
                    _alarmQueue.push(s);
                }
            });
            if (_alarmQueue.length > 0 && !document.getElementById('alarmOverlay').classList.contains('open')) {
                _showNextAlarm();
            }
        }

        function _pollAlarms() {
            fetch('/alarm-check/')
                .then(function(r){ return r.json(); })
                .then(function(d){ _checkAlarms(d.sessions || []); })
                .catch(function(){});
        }

        _pollAlarms();
        setInterval(_pollAlarms, 20000);
    </script>
</body>

</html>
